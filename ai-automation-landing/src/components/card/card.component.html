<article
  class="ui-card"
  [class.ui-card--elevated]="variant() === 'elevated'"
  [class.ui-card--flat]="variant() === 'flat'"
  [class.ui-card--outlined]="variant() === 'outlined'"
  [attr.aria-label]="title() ? title() + ' card' : null"
>
  <ng-content select="[card-header]"></ng-content>

  @if (title()) {
    <header class="ui-card__header">
      <h3 class="ui-card__title">{{ title() }}</h3>

      @if (subtitle()) {
        <p class="ui-card__subtitle">{{ subtitle() }}</p>
      }
    </header>
  }

  <div class="ui-card__content">
    <ng-content></ng-content>
  </div>

  <ng-content select="[card-footer]"></ng-content>
</article>
