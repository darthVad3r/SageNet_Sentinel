name: Cross-Repo Sync (Sentinel)
on:
  pull_request: { types: [opened, synchronize, reopened] }
  push:
    branches: [main, master]
    paths: ["contracts/**", "**/*.cs", ".github/orchestrator.yml"]
jobs:
  scoring-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Validate scoring downstream impact"
